services:
  hubtoo-plugin-lms:
    container_name: hubtoo-plugin-lms
    image: hubtoo-plugin-lms
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    environment:
      BASEROW_PUBLIC_URL: http://localhost
    volumes:
      - baserow_data:/baserow/data
volumes:
  baserow_data: